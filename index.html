// PAGE: LOG EVENTS
// ═══════════════════════════════════════════════════════════════════
function PageLogEvents({ data, save, toast }) {
  const evts=data.events||[];
  const now=new Date();
  const [sev,  setSev ]= useState("info");
  const [txt,  setTxt ]= useState("");
  const [date, setDate]= useState(now.toISOString().slice(0,10));
  const [time, setTime]= useState(now.toTimeString().slice(0,5));
  const [delId,setDelId]=useState(null);

  const log=async()=>{
    if(!txt.trim()){toast("Please enter a description");return;}
    const ev={id:mkId("ev"),severity:sev,text:txt.trim(),timestamp:`${date}T${time}:00`};
    await save({...data,events:[...evts,ev]});
    toast("Event logged"); setTxt("");
  };
  const del=async id=>{ await save({...data,events:evts.filter(e=>e.id!==id)}); toast("Deleted"); setDelId(null); };

  const sorted=[...evts].sort((a,b)=>b.timestamp?.localeCompare(a.timestamp));

  return (
    <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:18,maxWidth:960}}>
      <div className="settings-block">
        <div className="settings-block-title">Log an event</div>
        <div className="frow">
          <div className="field"><label>Severity</label>
            <select value={sev} onChange={e=>setSev(e.target.value)}>
              <option value="info">Info</option>
              <option value="warning">Warning</option>
              <option value="critical">Critical</option>
            </select></div>
          <div className="fcols" style={{gridTemplateColumns:"1fr 1fr"}}>
            <div className="field"><label>Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
            <div className="field"><label>Time</label><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></div>
          </div>
          <div className="field"><label>Description</label>
            <textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder="e.g. Motor overheated at 120°C"/></div>
          <button className="btn btn-p" style={{width:"fit-content"}} onClick={log}>Log event</button>
        </div>
      </div>
      <div className="card">
        <div className="card-title">Recent events</div>
        {sorted.length===0 ? <div className="empty">No events logged yet</div>
        : sorted.map(ev=>(
          <div key={ev.id} className={`ev ${ev.severity||"info"}`}
            style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div className="ev-meta">
                <span className={`ev-sev ${ev.severity||"info"}`}>{ev.severity}</span>
                {(ev.timestamp||"").slice(0,16).replace("T"," ")}
              </div>
              {ev.text}
            </div>
            <div style={{marginLeft:8,flexShrink:0}}>
              {delId===ev.id
                ? <div className="btn-row">
                    <button className="btn btn-d btn-sm" onClick={()=>del(ev.id)}>Confirm</button>
                    <button className="btn btn-s btn-sm" onClick={()=>setDelId(null)}>Cancel</button>
                  </div>
                : <button className="btn btn-s btn-sm" onClick={()=>setDelId(ev.id)}>Delete</button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// PAGE: SETTINGS
// ═══════════════════════════════════════════════════════════════════
function PageSettings({ data, save, toast, cfg, saveCfg, sync, onRefresh }) {
  const [proxyUrl, setProxyUrl]=useState(cfg.proxyUrl||DEFAULT_PROXY);

  const saveCfgLocal=()=>{
    saveCfg({...cfg,proxyUrl});
    toast("Settings saved");
    // Trigger a fresh load with new proxy URL after short delay
    setTimeout(() => load(true), 300);
  };

  const exportJson=()=>{
    const a=document.createElement("a");
    a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(data,null,2));
    a.download=`bench_data_${new Date().toISOString().slice(0,10)}.json`; a.click();
  };

  return (
    <div style={{maxWidth:680}}>
      <div className="settings-block">
        <div className="settings-block-title">Cloud sync</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:sync==="ok"?"var(--ok)":sync==="err"?"var(--danger)":"var(--warn)"}}/>
          <span style={{fontSize:12,color:"var(--text2)"}}>
            {sync==="ok"?"Connected — reading from Google Sheets":sync==="err"?"Read error — check network":"Connecting…"}
          </span>
          <button className="btn btn-s btn-sm" onClick={onRefresh}>Test connection</button>
        </div>
        <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"10px 12px",marginBottom:14}}>
          <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"var(--text3)",marginBottom:3}}>Sheet ID</div>
          <div style={{fontFamily:"monospace",fontSize:11,color:"var(--text2)"}}>{SHEET_ID}</div>
        </div>
        <div className="field" style={{marginBottom:12}}>
          <label>Write proxy URL (Apps Script Web App)</label>
          <input value={proxyUrl} onChange={e=>setProxyUrl(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec"/>
        </div>
        <button className="btn btn-p" onClick={saveCfgLocal}>Save</button>
      </div>

      <div className="settings-block">
        <div className="settings-block-title">Write access — Apps Script setup</div>
        <p style={{fontSize:12,color:"var(--text2)",marginBottom:10,lineHeight:1.6}}>
          To enable writing data from the browser, deploy a Google Apps Script as a Web App:
        </p>
        <ol style={{fontSize:12,color:"var(--text2)",paddingLeft:18,lineHeight:2,marginBottom:10}}>
          <li>Open your Google Sheet → Extensions → Apps Script</li>
          <li>Replace all code with the snippet below and click Save</li>
          <li>Click Deploy → New deployment → Web app</li>
          <li>Execute as: <b>Me</b> — Who has access: <b>Anyone</b> → Deploy</li>
          <li>Copy the Web App URL and paste it above</li>
        </ol>
        <pre>{`// ── Set this to match OP_PASS in your index.html ──────────────────
var OPERATOR_PIN = "air2024";

// ── GET: public read — no PIN required ────────────────────────────
// Used by the React app when opening from a local file (file://)
// to bypass the CORS restriction on the gviz CSV endpoint.
function doGet(e) {
  var params = e.parameter;
  if (params.action === "read") {
    var ss    = SpreadsheetApp.openById(params.sheetId);
    var sheet = ss.getSheetByName("bench_data");
    if (!sheet) return ContentService
      .createTextOutput("{}")
      .setMimeType(ContentService.MimeType.TEXT);
    var val = sheet.getRange("A1").getValue();
    return ContentService
      .createTextOutput(val || "{}")
      .setMimeType(ContentService.MimeType.TEXT);
  }
  return ContentService
    .createTextOutput("{}")
    .setMimeType(ContentService.MimeType.TEXT);
}

// ── POST: protected write — PIN required ──────────────────────────
function doPost(e) {
  var body = JSON.parse(e.postData.contents);
  if (body.pin !== OPERATOR_PIN) {
    return ContentService
      .createTextOutput("forbidden")
      .setMimeType(ContentService.MimeType.TEXT);
  }
  var ss    = SpreadsheetApp.openById(body.sheetId);
  var sheet = ss.getSheetByName("bench_data")
              || ss.insertSheet("bench_data");
  sheet.getRange("A1").setValue(body.data);
  return ContentService
    .createTextOutput("ok")
    .setMimeType(ContentService.MimeType.TEXT);
}`}</pre>
      </div>

      <div className="settings-block">
        <div className="settings-block-title">Asana integration</div>
        <div className="fcols" style={{gridTemplateColumns:"1fr 1fr",marginBottom:11}}>
          <div className="field"><label>Personal Access Token</label>
            <input type="password" defaultValue={data.asana?.token||""} id="asana_tok"/></div>
          <div className="field"><label>Project GID</label>
            <input type="text" defaultValue={data.asana?.project_gid||""} id="asana_gid"/></div>
        </div>
        <button className="btn btn-p" onClick={async()=>{
          await save({...data,asana:{token:document.getElementById("asana_tok").value,project_gid:document.getElementById("asana_gid").value}});
          toast("Asana settings saved");
        }}>Save Asana settings</button>
      </div>

      <div className="settings-block">
        <div className="settings-block-title">Data export</div>
        <button className="btn btn-s" onClick={exportJson}>Download bench_data.json</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
